version: '3.8'

services:
  anpr-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - TRITON_SERVER_URL=${TRITON_SERVER_URL:-triton:8000}
      - TRITON_MODEL_NAME=${TRITON_MODEL_NAME:-yolov8}
      - BATCH_SIZE=${BATCH_SIZE:-8}
      - CONFIDENCE_THRESHOLD=${CONFIDENCE_THRESHOLD:-0.5}
    volumes:
      - ./data:/app/data
      - ./app:/app/app
    env_file:
      - .env
    depends_on:
      - triton
    restart: unless-stopped

  triton:
    image: nvcr.io/nvidia/tritonserver:23.10-py3
    command: tritonserver --model-repository=/models
    ports:
      - "8001:8000"
      - "8002:8001"
      - "8003:8002"
    volumes:
      - ./models:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  data:
